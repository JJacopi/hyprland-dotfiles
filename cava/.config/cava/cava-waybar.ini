; ── Cava config for Waybar ────────────────────────────────────────────────
; Place this at: ~/.config/cava/cava-waybar.ini

[general]
; How many bars to render — keep low for the bar
bars = 10
; Frames per second
framerate = 60

[input]
method = pulse
source = auto

[output]
; 'noncurses' outputs raw characters, perfect for piping into Waybar
method = noncurses

; Block characters from low to high amplitude
; These go from near-empty to full block: ▁▂▃▄▅▆▇█
ascii_max_range = 7

; Use block-element characters (set 2 = ▁▂▃▄▅▆▇█)
bar_characters = ▁▂▃▄▅▆▇█

[smoothing]
integral = 77
monstercat = 1
waves = 0
gravity = 100
ignore = 0

[eq]
1 = 1
2 = 1
3 = 1
4 = 1
5 = 1
